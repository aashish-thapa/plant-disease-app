{% extends "base.html" %}
{% block title %}{% if disease %}Edit{% else %}Add{% endif %} Disease - PlantDoc{% endblock %}
{% block container_class %}container-medium{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{% if disease %}Edit disease{% else %}Add disease{% endif %}</h1>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="name">Disease name</label>
            <input class="form-input" type="text" id="name" name="name" value="{{ disease.name if disease else '' }}" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="plant">Plant type</label>
            <input class="form-input" type="text" id="plant" name="plant" value="{{ disease.plant if disease else '' }}" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-textarea" id="description" name="description">{{ disease.description if disease else '' }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label" for="treatment">Treatment steps</label>
            <textarea class="form-textarea" id="treatment" name="treatment">{{ disease.treatment if disease else '' }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label" for="prevention">Prevention</label>
            <textarea class="form-textarea" id="prevention" name="prevention">{{ disease.prevention if disease else '' }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label" for="chemical_treatment">Chemical treatment</label>
            <textarea class="form-textarea" id="chemical_treatment" name="chemical_treatment">{{ disease.chemical_treatment if disease else '' }}</textarea>
        </div>
        <div style="display: flex; gap: 0.75rem;">
            <button type="submit" class="btn btn-primary">{% if disease %}Save changes{% else %}Add disease{% endif %}</button>
            <a href="{{ url_for('admin.diseases') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

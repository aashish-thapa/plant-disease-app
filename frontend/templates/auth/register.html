{% extends "base.html" %}
{% block title %}Register - PlantDoc{% endblock %}
{% block container_class %}container-narrow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card">
        <h1>Create an account</h1>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label class="form-label" for="name">Full name</label>
                <input class="form-input" type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" minlength="6" required>
                <small style="color: var(--color-text-secondary); font-size: 0.8rem;">At least 6 characters</small>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create account</button>
        </form>
    </div>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
